<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">    <link rel="icon" type="image/x-icon" href="./images/calc-icon.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>A Calculator</header>
    <main>
        <div class="display">
            <div class="last-input"></div>
            <div class="current-input">0</div>
        </div>
        <div class="row A">
            <button id="clear-all">AC</button>
            <button id="clear-entry">C</button>
            <button class="operator" id="remainder">%</button>
            <button class="operator" id="div">&divide</button>
        </div>
        <div class="row B">
            <button class="num" id="seven">7</button>
            <button class="num" id="eight">8</button>
            <button class="num" id="nine">9</button>
            <button class="operator" id="multiply">&#215</button>
        </div>
        <div class="row C">
            <button class="num" id="four">4</button>
            <button class="num" id="five">5</button>
            <button class="num" id="six">6</button>
            <button class="operator" id="subtract">-</button>
        </div>
        <div class="row D">
            <button class="num" id="one">1</button>
            <button class="num" id="two">2</button>
            <button class="num" id="three">3</button>
            <button class="operator" id="add">+</button>
        </div>
        <div class="row E">
            <button class="num" id="zero">0</button>
            <button id="decimal">.</button>
            <button id="sum">=</button>
        </div>
    </main>

    <footer>Created by Dan</footer>
</body>
</html>
